<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0f1218; --card: #1a1f26; --accent: #007aff; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 15px; overflow: hidden; }
        
        /* Профиль */
        .profile-header { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 12px 16px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #2c323a; }
        .balance-info { display: flex; align-items: center; gap: 8px; }
        .ton-badge { background: #242a35; padding: 4px 10px; border-radius: 8px; font-weight: bold; color: #4cd964; }
        .add-btn { background: var(--accent); border: none; color: white; border-radius: 8px; width: 28px; height: 28px; font-size: 18px; cursor: pointer; }

        /* Игровая сетка */
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; background: #333; border: 2px solid #2c323a; border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
        .cell { aspect-ratio: 1/1; background: #1a1f26; position: relative; transition: 0.3s; }
        .fill { position: absolute; bottom: 0; width: 100%; background: var(--accent); opacity: 0.5; transition: height 0.5s ease; }
        
        /* Управление */
        .controls { display: flex; gap: 10px; margin-bottom: 15px; }
        .bet-input { flex: 1; background: #1a1f26; border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; font-size: 16px; text-align: center; }
        .btn-play { flex: 2; background: var(--accent); border: none; color: white; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; }

        #timer-text { text-align: center; color: #8a8f98; margin-bottom: 8px; font-size: 14px; }

        /* Шторка победителя */
        #win-overlay { position: fixed; bottom: -100%; left: 0; width: 100%; height: 60%; background: #1c2127; border-top: 3px solid gold; border-top-left-radius: 25px; border-top-right-radius: 25px; z-index: 1000; transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); padding: 20px; box-sizing: border-box; text-align: center; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        #win-overlay.active { bottom: 0; }
        .winner-avatar { width: 80px; height: 80px; background: #333; border-radius: 50%; margin: 0 auto 15px; border: 3px solid gold; }
    </style>
</head>
<body>

    <div class="profile-header">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div style="width: 32px; height: 32px; background: #444; border-radius: 50%;" id="user-pfp"></div>
            <span id="username-display">@loading</span>
        </div>
        <div class="balance-info">
            <div class="ton-badge"><span id="balance-val">0.00</span> TON</div>
            <button class="add-btn" onclick="addTon()">+</button>
        </div>
    </div>

    <div id="timer-text">Ожидание игроков...</div>
    
    <div class="grid" id="game-grid"></div>

    <div class="controls">
        <input type="number" id="bet-amount" class="bet-input" value="1.0" step="0.1">
        <button class="btn-play" onclick="placeBet()">ПОСТАВИТЬ</button>
    </div>

    <div id="win-overlay">
        <div style="color: gold; font-weight: bold; font-size: 18px; margin-bottom: 20px;">ПОБЕДИТЕЛЬ РАУНДА!</div>
        <div class="winner-avatar" id="win-pfp"></div>
        <div style="font-size: 24px; font-weight: bold; margin-bottom: 5px;" id="win-name">@player</div>
        <div style="color: #4cd964; font-size: 32px; font-weight: bold;" id="win-prize">+0.00 TON</div>
        <button class="btn-play" style="margin-top: 30px; width: 80%;" onclick="closeWin()">КРУТО!</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // Поддержка теста в браузере и в ТГ
        const uid = tg.initDataUnsafe?.user?.id || "12345";
        const uname = tg.initDataUnsafe?.user?.username || "Gamer";

        // Генерация сетки
        const grid = document.getElementById('game-grid');
        for(let i=0; i<100; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.id = `cell-${i}`;
            cell.innerHTML = '<div class="fill"></div>';
            grid.appendChild(cell);
        }

        async function update() {
            try {
                const res = await fetch(`/api/get_state?uid=${uid}&username=${uname}`);
                const data = await res.json();

                document.getElementById('balance-val').innerText = data.user.bal.toFixed(2);
                document.getElementById('username-display').innerText = "@" + data.user.name;

                if (data.game.is_active) {
                    document.getElementById('timer-text').innerText = `Метеорит через: ${data.game.timer}с`;
                    
                    const totalBank = Object.values(data.game.players).reduce((a, b) => a + b, 0);
                    const myBet = data.game.players[uid] || 0;
                    const percent = totalBank > 0 ? (myBet / totalBank * 100) : 0;
                    
                    document.querySelectorAll('.fill').forEach(f => f.style.height = percent + '%');
                } else {
                    document.getElementById('timer-text').innerText = "Минимум 2 игрока для старта";
                }

                if (data.game.result) {
                    showWinner(data.game.result);
                }
            } catch (e) { console.log("Sync..."); }
        }

        function showWinner(res) {
            document.getElementById('win-name').innerText = "@" + res.username;
            document.getElementById('win-prize').innerText = "+" + res.prize + " TON";
            document.getElementById('win-overlay').classList.add('active');
            
            const cell = document.getElementById(`cell-${res.cell}`);
            if(cell) cell.style.background = "radial-gradient(circle, #ff9500, #ff3b30)";
        }

        function closeWin() {
            document.getElementById('win-overlay').classList.remove('active');
            location.reload();
        }

        function addTon() {
            fetch('/api/add_ton', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({uid})})
            .then(() => update());
        }

        function placeBet() {
            const amount = document.getElementById('bet-amount').value;
            fetch('/api/place_bet', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({uid, amount})})
            .then(() => update());
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
